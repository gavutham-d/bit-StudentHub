services:
  # ── Backend: Express API ──────────────────────────────────────────
  - type: web
    name: bits-student-hub-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

  # ── Frontend: React + Vite (Static Site) ─────────────────────────
  - type: web
    name: bits-student-hub-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: bits-student-hub-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
